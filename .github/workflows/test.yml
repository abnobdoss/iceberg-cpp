name: Test

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ICEBERG_HOME: /tmp/iceberg

jobs:
  ubuntu:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: AMD64 Ubuntu 26.04
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "2G"
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install dependencies
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Restore sccache cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-test-ubuntu-${{ github.run_id }}
          restore-keys: |
            sccache-test-ubuntu-
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Build Iceberg
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: ci/scripts/build_iceberg.sh $(pwd) ON ON
      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats
      - name: Save sccache cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-test-ubuntu-${{ github.run_id }}
      - name: Build Example
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: ci/scripts/build_example.sh $(pwd)/example
  macos:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: AArch64 macOS 26
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "2G"
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Restore sccache cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-test-macos-${{ github.run_id }}
          restore-keys: |
            sccache-test-macos-
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Build Iceberg
        shell: bash
        run: ci/scripts/build_iceberg.sh $(pwd) OFF ON
      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats
      - name: Save sccache cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-test-macos-${{ github.run_id }}
      - name: Build Example
        shell: bash
        run: ci/scripts/build_example.sh $(pwd)/example
  windows:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: AMD64 Windows 2025
    runs-on: windows-2025
    timeout-minutes: 60
    strategy:
      fail-fast: false
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "2G"
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x64
      # Provide a prebuilt Arrow/Parquet from conda-forge so the build resolves it
      # via find_package(Arrow CONFIG) instead of compiling Arrow from source.
      - name: Set up conda (prebuilt Arrow)
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          activate-environment: arrow
      # Run in pwsh: setup-miniconda's env activation is unreliable in bash on the
      # Windows runner. Expose the conda prefix through CMAKE_PREFIX_PATH so the
      # standard find_package(Arrow CONFIG) resolves it; fail fast (with a listing)
      # if the config is missing rather than silently building vendored Arrow.
      - name: Install prebuilt Arrow + Parquet
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $libDir = Join-Path $env:CONDA "envs\arrow\Library"
          & "$env:CONDA\condabin\conda.bat" install -n arrow -y -c conda-forge "libarrow=24.0.*" "libparquet=24.0.*"
          if ($LASTEXITCODE -ne 0) { throw "conda install failed" }
          if (-not (Test-Path (Join-Path $libDir "lib\cmake\Arrow\ArrowConfig.cmake"))) {
            Write-Host "Arrow cmake config NOT FOUND under $libDir. *Config.cmake present:"
            Get-ChildItem -Path $libDir -Recurse -Filter *Config.cmake -ErrorAction SilentlyContinue | Select-Object -First 60 | ForEach-Object { $_.FullName }
            throw "prebuilt Arrow cmake config not found"
          }
          Add-Content -Path $env:GITHUB_ENV  -Value "CMAKE_PREFIX_PATH=$($libDir -replace '\\','/')"
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $libDir "bin")
      - name: Cache vcpkg packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: vcpkg-cache
        with:
          path: C:/vcpkg/installed
          key: vcpkg-x64-windows-test-${{ hashFiles('.github/workflows/test.yml') }}
      - name: Install dependencies
        if: ${{ steps.vcpkg-cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows nlohmann-json:x64-windows nanoarrow:x64-windows roaring:x64-windows cpr:x64-windows
      - name: Restore sccache cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-test-windows-${{ github.run_id }}
          restore-keys: |
            sccache-test-windows-
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Build Iceberg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          bash -lc 'ci/scripts/build_iceberg.sh $(pwd) OFF ON'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          sccache --show-stats
      - name: Save sccache cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-test-windows-${{ github.run_id }}
      - name: Build Example
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          bash -lc 'ci/scripts/build_example.sh $(pwd)/example'
  meson:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Meson - ${{ matrix.title }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "2G"
    strategy:
      max-parallel: 15
      fail-fast: false
      matrix:
        include:
          - title: AMD64 Ubuntu 26.04
            runs-on: ubuntu-26.04
            CC: gcc-14
            CXX: g++-14
            meson-setup-args: -Drest_integration_test=enabled
          - title: AMD64 Windows 2025
            runs-on: windows-2025
            meson-setup-args: --vsenv
          - title: AArch64 macOS 26
            runs-on: macos-26
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
      - name: Set Ubuntu Compilers
        # Wrap the compiler with sccache: Meson auto-detects sccache for the
        # default compiler (macOS/Windows), but uses an explicit CC/CXX verbatim,
        # so the launcher must be prepended here to route Ubuntu compiles through it.
        if: ${{ startsWith(matrix.runs-on, 'ubuntu') }}
        run: |
          echo "CC=sccache ${{ matrix.CC }}" >> $GITHUB_ENV
          echo "CXX=sccache ${{ matrix.CXX }}" >> $GITHUB_ENV
      - name: Restore sccache cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-meson-${{ matrix.runs-on }}-${{ github.run_id }}
          restore-keys: |
            sccache-meson-${{ matrix.runs-on }}-
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Build Iceberg
        run: |
          meson setup builddir ${{ matrix.meson-setup-args || '' }}
          meson compile -C builddir
      - name: Show sccache stats
        run: sccache --show-stats
      - name: Save sccache cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-meson-${{ matrix.runs-on }}-${{ github.run_id }}
      - name: Test Iceberg
        run: |
          meson test -C builddir --timeout-multiplier 0 --print-errorlogs
